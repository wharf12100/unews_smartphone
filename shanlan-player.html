<style>
  :root {
    --gold: #c8a84b;
    --gold-light: #e5c97a;
    --ink: #1c1008;
    --bg-card: #f7f1e4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow: hidden; }
  body {
    background: transparent;
    font-family: "Noto Sans TC", sans-serif;
    display: flex;
    justify-content: center;
    padding: 6px 8px 0;
  }
  .player-wrap { width: min(820px, 100%); position: relative; background: transparent; }
  .player-card {
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(200,168,75,0.09) 0%, transparent 65%),
      #f7f1e4;
    border: 1px solid rgba(200,168,75,0.55);
    box-shadow: 5px 5px 0 rgba(28,19,8,0.09), 0 12px 36px rgba(28,19,8,0.10), inset 0 0 0 1px rgba(212,104,138,0.1);
    display: grid;
    grid-template-columns: 90px 1fr;
    align-items: stretch;
    position: relative;
    overflow: hidden;
  }
  .player-card::before, .player-card::after {
    content: "";
    position: absolute;
    width: 22px; height: 22px;
    border-style: solid;
    border-color: var(--gold);
    pointer-events: none;
    z-index: 4;
  }
  .player-card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .player-card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
  .corner-tr, .corner-bl {
    position: absolute;
    width: 22px; height: 22px;
    border-style: solid;
    border-color: rgba(212,104,138,0.5);
    pointer-events: none;
    z-index: 4;
  }
  .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .cover-col {
    width: 90px; flex-shrink: 0;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-right: 1px solid rgba(200,168,75,0.35);
  }
  .cover-col img {
    width: 100%; height: 100%;
    object-fit: contain; display: block; background:#fdf0f3;
    filter: saturate(0.92);
  }
  .player-body {
    padding: 13px 18px 11px 16px;
    display: flex; flex-direction: column; gap: 9px; min-width: 0;
  }
  .player-meta {
    display: flex; align-items: center; gap: 10px; min-width: 0;
  }
  .show-name {
    font-family: "Noto Serif TC", serif;
    font-size: 0.92rem; font-weight: 700;
    color: var(--ink); white-space: nowrap;
    letter-spacing: 0.03em; flex-shrink: 0;
  }
  .episode-label {
    font-size: 0.68rem; color: var(--gold); font-weight: 500;
    letter-spacing: 0.14em; white-space: nowrap;
    background: rgba(212,104,138,0.1);
    border: 1px solid rgba(200,168,75,0.35);
    padding: 1px 7px; flex-shrink: 0;
  }
  .waveform {
    display: flex; align-items: center; gap: 2px;
    height: 16px; flex-shrink: 0;
    opacity: 0; transition: opacity 0.2s;
  }
  .player-card.is-playing .waveform { opacity: 1; }
  .wave-bar {
    width: 2px; background: var(--gold);
    border-radius: 1px;
    animation: wave 0.9s ease-in-out infinite;
    transform-origin: center;
  }
  .wave-bar:nth-child(1) { height: 6px;  animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 11px; animation-delay: 0.12s; }
  .wave-bar:nth-child(3) { height: 8px;  animation-delay: 0.24s; }
  .wave-bar:nth-child(4) { height: 13px; animation-delay: 0.08s; }
  .wave-bar:nth-child(5) { height: 7px;  animation-delay: 0.3s; }
  @keyframes wave {
    0%, 100% { transform: scaleY(1); }
    50%       { transform: scaleY(0.3); }
  }
  .controls-row { display: flex; align-items: center; gap: 12px; }
  .play-btn {
    flex-shrink: 0;
    width: 32px; height: 32px;
    border: 1.5px solid var(--gold);
    background: rgba(212,104,138,0.08);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
    outline: none;
  }
  .play-btn:hover { background: rgba(212,104,138,0.22); transform: scale(1.06); }
  .play-btn:active { transform: scale(0.97); }
  .play-btn svg { width: 13px; height: 13px; fill: var(--gold); }
  .progress-wrap {
    flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0;
  }
  .progress-track {
    width: 100%; height: 3px;
    background: rgba(212,104,138,0.12);
    position: relative; cursor: pointer;
    transition: height 0.12s;
  }
  .progress-track:hover { height: 5px; }
  .progress-fill {
    position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
    background: linear-gradient(90deg, rgba(212,104,138,0.5) 0%, var(--gold) 100%);
    transition: width 0.1s linear;
  }
  .progress-thumb {
    position: absolute; right: -4px; top: 50%;
    transform: translateY(-50%);
    width: 8px; height: 8px;
    background: var(--gold);
    border: 1.5px solid #f7f1e4;
    border-radius: 50%;
    opacity: 0; transition: opacity 0.15s;
    pointer-events: none;
  }
  .progress-track:hover .progress-thumb { opacity: 1; }
  .time-row {
    display: flex; justify-content: space-between;
    font-size: 0.66rem; color: rgba(58,26,46,0.45);
    letter-spacing: 0.06em; font-variant-numeric: tabular-nums;
  }
  .player-source {
    margin-top: 2px; font-size: 0.62rem;
    color: rgba(212,104,138,0.5);
    letter-spacing: 0.1em; text-align: right;
  }
  audio { display: none; }
  @media (max-width: 480px) {
    .player-card { grid-template-columns: 68px 1fr; }
    .cover-col { width: 68px; }
  }
</style>

<style data-patch="global-ming-font-v19">

:root {
  --ming-font-stack: "Noto Serif TC", "Songti TC", "PMingLiU", "MingLiU", "Songti SC", "Source Han Serif TC", "Source Han Serif", serif;
}

html, body,
h1, h2, h3, h4, h5, h6,
p, span, div, a, li, ul, ol,
label, small, strong, em, blockquote,
figcaption, table, thead, tbody, tfoot, tr, th, td,
section, article, header, footer, nav,
button, input, textarea, select, option {
  font-family: var(--ming-font-stack) !important;

}

/* 保留Font Awesome / icon字型，不要被明體覆蓋 */
.fa, .fas, .far, .fal, .fab, .fa-solid, .fa-regular, .fa-brands,

  font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands" !important;

}

::placeholder {
  font-family: var(--ming-font-stack) !important;
}
</style>

<script>
(function() {
  var audio    = document.getElementById('audioEl');
  var card     = document.getElementById('playerCard');
  var playBtn  = document.getElementById('playBtn');
  var iconPlay = document.getElementById('iconPlay');
  var iconPause= document.getElementById('iconPause');
  var fill     = document.getElementById('progressFill');
  var track    = document.getElementById('progressTrack');
  var timeCur  = document.getElementById('timeCurrent');
  var timeDur  = document.getElementById('timeDuration');

  function fmt(s) {
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }
  audio.addEventListener('loadedmetadata', function() {
    timeDur.textContent = fmt(audio.duration);
  });
  function toggle() {
    if (audio.paused) { audio.play(); } else { audio.pause(); }
  }
  playBtn.addEventListener('click', toggle);
  audio.addEventListener('play', function() {
    iconPlay.style.display = 'none';
    iconPause.style.display = '';
    card.classList.add('is-playing');
  });
  audio.addEventListener('pause', function() {
    iconPlay.style.display = '';
    iconPause.style.display = 'none';
    card.classList.remove('is-playing');
  });
  audio.addEventListener('ended', function() {
    iconPlay.style.display = '';
    iconPause.style.display = 'none';
    card.classList.remove('is-playing');
    fill.style.width = '0%';
    timeCur.textContent = '0:00';
    audio.currentTime = 0;
  });
  audio.addEventListener('timeupdate', function() {
    if (!audio.duration) return;
    fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    timeCur.textContent = fmt(audio.currentTime);
  });
  function seekTo(clientX) {
    var rect = track.getBoundingClientRect();
    var x = Math.max(0, Math.min(clientX - rect.left, rect.width));
    if (audio.duration) audio.currentTime = (x / rect.width) * audio.duration;
  }
  var dragging = false;
  track.addEventListener('mousedown', function(e) { dragging = true; seekTo(e.clientX); });
  document.addEventListener('mousemove', function(e) { if (dragging) seekTo(e.clientX); });
  document.addEventListener('mouseup', function() { dragging = false; });
  track.addEventListener('touchstart', function(e) { seekTo(e.touches[0].clientX); }, {passive:true});
  track.addEventListener('touchmove',  function(e) { seekTo(e.touches[0].clientX); }, {passive:true});
  track.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') audio.currentTime = Math.min(audio.duration, audio.currentTime + 2);
    if (e.key === 'ArrowLeft')  audio.currentTime = Math.max(0, audio.currentTime - 2);
  });
})();
</script>

<script data-patch="disable-episode-card-clicks-v180">
document.addEventListener('click', function(event){
  var link = event.target && event.target.closest ? event.target.closest('a[data-disabled-link="true"]') : null;
  if(!link) return;
  event.preventDefault();
  event.stopPropagation();
  event.stopImmediatePropagation && event.stopImmediatePropagation();
}, true);
</script>
